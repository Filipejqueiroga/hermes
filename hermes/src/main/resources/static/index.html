<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand fs-3">🛒 Hermes</span>
        <button class="btn btn-primary" onclick="openModal()">+ Add Product</button>
    </nav>
    <div class="container mt-4">
        <div class="row" id="products-container">
        <!-- cards will be added here by JavaScript -->
        </div>
    </div>
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="modal-title">Add Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="product-id">
                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text" id="product-name" class="form-control" placeholder="Product name" required>
                    </div>
                    <div class="mb-3">
                        <label>Description</label>
                        <input type="text" id="product-description" class="form-control" placeholder="Product description">
                    </div>
                    <div class="mb-3">
                        <label>Price</label>
                        <input type="number" id="product-price" class="form-control" placeholder="0.00" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label>Quantity</label>
                        <input type="number" id="product-quantity" class="form-control" placeholder="0" required>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveProduct()">Save</button>
                </div>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = "http://localhost:8080/api/v1/products";
        let modal = null;

        document.addEventListener("DOMContentLoaded", () => {
            modal = new bootstrap.Modal(document.getElementById("productModal"));
            loadProducts();
        });

        function openModal(product = null) {
            document.getElementById("product-id").value = "";
            document.getElementById("product-name").value = "";
            document.getElementById("product-description").value = "";
            document.getElementById("product-price").value = "";
            document.getElementById("product-quantity").value = "";

            if (product) {
                document.getElementById("modal-title").innerText = "Edit Product";
                document.getElementById("product-id").value = product.id;
                document.getElementById("product-name").value = product.name;
                document.getElementById("product-description").value = product.description;
                document.getElementById("product-price").value = product.price;
                document.getElementById("product-quantity").value = product.quantity;
            } else {
                document.getElementById("modal-title").innerText = "Add Product";
            }

            modal.show();
        }

        function loadProducts() {
            fetch(API_URL)
                .then(res => res.json())
                .then(products => {
                    const container = document.getElementById("products-container");
                    container.innerHTML = "";
                    products.forEach(product => {
                        container.innerHTML += `
                            <div class="col-md-4 mb-4">
                                <div class="card h-100">
                                    <div class="card-body">
                                        <h5 class="card-title">${product.name}</h5>
                                        <p class="card-text text-muted">${product.description}</p>
                                        <p class="card-text"><strong>R$ ${product.price}</strong></p>
                                        <p class="card-text">Qty: ${product.quantity}</p>
                                    </div>
                                    <div class="card-footer d-flex gap-2">
                                        <button class="btn btn-warning btn-sm w-50" onclick='openModal(${JSON.stringify(product)})'>Edit</button>
                                        <button class="btn btn-danger btn-sm w-50" onclick="deleteProduct(${product.id})">Delete</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                });
        }

        function saveProduct() {
            const id = document.getElementById("product-id").value;
            const product = {
                name: document.getElementById("product-name").value,
                description: document.getElementById("product-description").value,
                price: document.getElementById("product-price").value,
                quantity: document.getElementById("product-quantity").value
            };

            const method = id ? "PUT" : "POST";
            const url = id ? `${API_URL}/${id}` : API_URL;

            fetch(url, {
                method: method,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(product)
            })
                .then(() => {
                    modal.hide();
                    loadProducts();
                });
        }

        function deleteProduct(id) {
            if (confirm("Are you sure you want to delete this product?")) {
                fetch(`${API_URL}/${id}`, { method: "DELETE" })
                    .then(() => loadProducts());
            }
        }
    </script>
</body>
</html>
