<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand fs-3">🛒 Hermes</span>
        <button class="btn btn-primary" onclick="openModal()">+ Add Product</button>
    </nav>
    <div class="container mt-4">
        <div class="row" id="products-container">
        <!-- cards will be added here by JavaScript -->
        </div>
    </div>
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="modal-title">Add Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="product-id">
                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text" id="product-name" class="form-control" placeholder="Product name" required>
                    </div>
                    <div class="mb-3">
                        <label>Description</label>
                        <input type="text" id="product-description" class="form-control" placeholder="Product description">
                    </div>
                    <div class="mb-3">
                        <label>Price</label>
                        <input type="number" id="product-price" class="form-control" placeholder="0.00" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label>Quantity</label>
                        <input type="number" id="product-quantity" class="form-control" placeholder="0" required>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveProduct()">Save</button>
                </div>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
