<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes — Cadastro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>

  <main class="auth-page">
    <div class="auth-card">

      <div class="card-logo">
        <span class="logo-icon">☤</span>
        <h2>Hermes</h2>
        <p>Junte-se ao mercado dos deuses</p>
      </div>

      <div id="form-error" class="alert alert-error" style="display:none; margin-bottom:1.2rem;"></div>

      <div class="form-group">
        <label>Nome de usuário</label>
        <input type="text" id="username" placeholder="Seu nome no Olimpo" autocomplete="username">
      </div>

      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
      </div>

      <button class="btn btn-gold btn-full" style="margin-top:0.5rem;" onclick="register()">
        Criar conta
      </button>

      <div class="form-footer">
        <p>Já tem uma conta? <a href="login.html">Entrar</a></p>
      </div>

    </div>
  </main>

  <script src="../scripts/api.js"></script>
  <script src="../scripts/auth.js"></script>
  <script>
    if (auth.isLoggedIn()) {
      window.location.href = 'index.html';
    }

    async function register() {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('form-error');

      errorEl.style.display = 'none';

      if (!username || !email || !password) {
        errorEl.textContent = 'Preencha todos os campos';
        errorEl.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        errorEl.textContent = 'A senha deve ter pelo menos 6 caracteres';
        errorEl.style.display = 'block';
        return;
      }

      try {
        await api.auth.register(username, email, password);
        window.location.href = 'login.html';
      } catch (err) {
        errorEl.textContent = err.message || 'Erro ao criar conta';
        errorEl.style.display = 'block';
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') register();
    });
  </script>
</body>
</html>
